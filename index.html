<section class="cinematic">

<div class="sticky">

<img src="socialhub.jpg" class="bg">

<div class="overlay"></div>

<div class="text text1">Вы думаете, что покупаете квартиру</div>
<div class="text text2">Но на самом деле выбираете актив</div>
<div class="text text3">Который либо растёт…</div>
<div class="text text4">Либо замораживает ваши деньги</div>

</div>

</section>

<style>

.cinematic{
height:400vh;
position:relative;
}

.sticky{
position:sticky;
top:0;
height:100vh;
overflow:hidden;
}

.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
transform:scale(1.2);
transition:transform 1s;
filter:brightness(.5);
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.text{
position:absolute;
width:100%;
text-align:center;
top:50%;
transform:translateY(-50%);
font-size:40px;
font-family:'Playfair Display';
opacity:0;
transition:1s;
}

.text.active{
opacity:1;
transform:translateY(-60%);
}

</style>

<script>

const texts=document.querySelectorAll('.text');

window.addEventListener('scroll',()=>{
let scroll=window.scrollY;
let vh=window.innerHeight;

texts.forEach((el,i)=>{
if(scroll > vh*(i+0.5)){
el.classList.add('active');
}else{
el.classList.remove('active');
}
});

});

</script>
